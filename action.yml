name: 'Copy Release Files'
description: 'Copy Tauri build files to versioned release directory with optional FTP upload'
inputs:
  source-dir:
    description: 'Source directory containing bundled files'
    required: false
    default: 'src-tauri/target/release/bundle/'
  target-root:
    description: 'Target root directory for release files'
    required: false
    default: 'src-tauri/target/release/fabu/'
  config-file:
    description: 'Path to tauri.conf.json'
    required: false
    default: 'src-tauri/tauri.conf.json'
  filter-by-version:
    description: '是否只复制符合当前版本号的文件到指定目录'
    required: false
    default: 'true'
  enable-ftp:
    description: 'FTP mode: disabled (default), ci (external FTP step), use (built-in FTP)'
    required: false
    default: 'disabled'
  ftp-host:
    description: 'FTP server hostname (required when enable-ftp is "use")'
    required: false
  ftp-username:
    description: 'FTP username (required when enable-ftp is "use")'
    required: false
  ftp-password:
    description: 'FTP password (required when enable-ftp is "use")'
    required: false
  ftp-server-dir:
    description: 'Remote directory on FTP server'
    required: false
    default: ''
  upload-latest:
    description: '是否上传Latest版本到FTP服务器'
    required: false
    default: 'disabled'
  github-token: 
    description: 'GitHub token for FTP upload'
    required: false
    default: ''
  cdn-base-url:
    description: 'CDN base URL for download links (e.g., https://cdn.example.com/)'
    required: false
    default: 'https://cdn.ali.yiruan.wang/'
  timezone:
    description: 'Timezone for pub_date in latest.json (e.g., Asia/Shanghai, UTC)'
    required: false
    default: 'Asia/Shanghai'


outputs:
  version:
    description: 'Application version extracted from config'
    value: ${{ steps.extract-version.outputs.version }}
  target-dir:
    description: 'Full path to the versioned target directory'
    value: ${{ steps.create-target-dir.outputs.target_dir }}
  enable-ftp:
    description: 'Current FTP mode (disabled/ci/use)'
    value: ${{ steps.main.outputs.enable-ftp }}
  ftp-upload-success:
    description: 'FTP upload result (disabled/external/true/false)'
    value: ${{ steps.main.outputs.ftp-upload-success }}
  latest-json-path:
    description: 'Path to the latest.json file'
    value: ${{ steps.main.outputs.latest-json-path }}

runs:
  using: 'node16'
  main: 'dist/index.js'